<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 27 - Dashboard Utama</title>
    <style>
        /* Base Reset & Core Typography */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            display: block;
            background: #020205;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Fluid Engine Background (iOS 27 Concept) */
        .ambient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at 10% 20%, #0d1127 0%, #020205 80%),
                        radial-gradient(circle at 90% 80%, #1a0b2e 0%, #020205 80%);
            overflow: hidden;
        }

        .blur-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.45;
            mix-blend-mode: screen;
            animation: fluidMotion 25s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 45vh;
            height: 45vh;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            top: 15%;
            left: 10%;
        }

        .blob-2 {
            width: 55vh;
            height: 55vh;
            background: linear-gradient(135deg, #b5179e, #3a0ca3);
            bottom: 10%;
            right: 5%;
            animation-delay: -7s;
        }

        .blob-3 {
            width: 35vh;
            height: 35vh;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            bottom: 40%;
            left: 40%;
            animation-delay: -14s;
        }

        @keyframes fluidMotion {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(8%, 12%) scale(1.15) rotate(90deg); }
            100% { transform: translate(-5%, -8%) scale(0.9) rotate(180deg); }
        }

        /* Root Architecture & Layout Matrix */
        .system-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: env(safe-area-inset-top) 2rem env(safe-area-inset-bottom) 2rem;
        }

        /* Dynamic Island 27.0 Navigation Indicator */
        .dynamic-island-pro {
            position: absolute;
            top: 24px;
            width: 120px;
            height: 36px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .dynamic-island-pro:hover {
            width: 280px;
            height: 48px;
            background: rgba(5, 5, 10, 0.95);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(124, 58, 237, 0.25);
        }

        .island-status {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.6);
            transition: opacity 0.3s;
        }

        .island-expanded-content {
            display: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffffff;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .dynamic-island-pro:hover .island-status { display: none; }
        .dynamic-island-pro:hover .island-expanded-content { display: block; opacity: 1; }

        /* System Header Accent */
        .system-meta {
            text-align: center;
            margin-bottom: 3.5rem;
            pointer-events: none;
        }

        .system-time {
            font-size: 3.8rem;
            font-weight: 200;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #ffffff 60%, rgba(255,255,255,0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .system-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #a78bfa;
            opacity: 0.9;
        }

        /* Glassmorphism Control Grid System */
        .control-hub-grid {
            display: grid;
            gap: 2.5rem;
            width: 100%;
            max-width: 900px;
            padding: 1rem;
            justify-content: center;
            align-items: center;
        }

        /* Core Responsiveness Constraints (9:16 vs 16:9 Adaptability) */
        @media (min-aspect-ratio: 1/1) {
            /* 16:9 Desktop / Landscape Perspective */
            .control-hub-grid {
                grid-template-columns: repeat(2, 1fr);
                max-width: 760px;
            }
        }

        @media (max-aspect-ratio: 1/1) {
            /* 9:16 Mobile / Portrait Perspective */
            .control-hub-grid {
                grid-template-columns: 1fr;
                max-width: 340px;
                gap: 2rem;
            }
            .system-time { font-size: 3.2rem; }
        }

        /* iOS 27 Dual Glassmorphism Node Archetype */
        .ios-action-trigger {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 36px;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        background-color 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25), 
                        inset 0 1px 0px rgba(255, 255, 255, 0.1);
        }

        /* Soft internal specular highlight gradient layer */
        .ios-action-trigger::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 100%);
            border-radius: 36px;
            z-index: -1;
        }

        /* Next-Gen Interaction States */
        .ios-action-trigger:hover {
            transform: translateY(-10px) scale(1.03);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45), 
                        0 0 40px rgba(139, 92, 246, 0.15),
                        inset 0 1px 0px rgba(255, 255, 255, 0.2);
        }

        .ios-action-trigger:active {
            transform: translateY(-4px) scale(0.97);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(45px) saturate(180%);
        }

        /* Glassmorphism Square Icon System */
        .square-glass-icon {
            width: 88px;
            height: 88px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 24px; /* Pure iOS Squircle Aesthetic */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.8rem;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.2), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.25);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                        background-color 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ios-action-trigger:hover .square-glass-icon {
            transform: scale(1.06) rotate(2deg);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        /* Minimal Vector Aesthetics */
        .square-glass-icon svg {
            width: 38px;
            height: 38px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 1.65;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            transition: stroke 0.4s;
        }

        /* Action Node Label Typography */
        .action-label {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.85);
            transition: color 0.4s, text-shadow 0.4s;
        }

        .ios-action-trigger:hover .action-label {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
        }

        /* Haptic Interaction Simulation via Subtle Footer */
        .system-footer {
            position: absolute;
            bottom: 24px;
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Ambient Engine Viewport Background Layers -->
    <div class="ambient-canvas">
        <div class="blur-blob blob-1"></div>
        <div class="blur-blob blob-2"></div>
        <div class="blur-blob blob-3"></div>
    </div>

    <!-- Core App Shell Container -->
    <div class="system-wrapper">
        
        <!-- Premium Dynamic Island Component -->
        <div class="dynamic-island-pro">
            <span class="island-status">Welcome!</span>
            <span class="island-expanded-content">✦ Sytem Active</span>
        </div>

        <!-- Meta Core Brand Display -->
        <div class="system-meta">
            <div class="system-time" id="liveClock">00:00</div>
            <div class="system-title">NAMA TOKO</div>
        </div>

        <!-- Multi-Aspect Configured Interactive Grid Matrix -->
        <div class="control-hub-grid">
            
            <!-- Node Alpha: Dashboard Component -->
            <a href="DASHBOARD.html" class="ios-action-trigger">
                <div class="square-glass-icon">
                    <!-- iOS 27 Geometric Grid / Layout Icon -->
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="9" rx="1.5"></rect>
                        <rect x="14" y="3" width="7" height="5" rx="1.5"></rect>
                        <rect x="14" y="12" width="7" height="9" rx="1.5"></rect>
                        <rect x="3" y="16" width="7" height="5" rx="1.5"></rect>
                    </svg>
                </div>
                <div class="action-label">Dashboard</div>
            </a>

            <!-- Node Beta: Settings Component -->
            <a href="SETTING.html" class="ios-action-trigger">
                <div class="square-glass-icon">
                    <!-- iOS 27 Mechanical / Interface Sliders Icon -->
                    <svg viewBox="0 0 24 24">
                        <line x1="4" y1="21" x2="4" y2="14"></line>
                        <line x1="4" y1="10" x2="4" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12" y2="3"></line>
                        <line x1="20" y1="21" x2="20" y2="16"></line>
                        <line x1="20" y1="12" x2="20" y2="3"></line>
                        <line x1="1" y1="14" x2="7" y2="14"></line>
                        <line x1="9" y1="8" x2="15" y2="8"></line>
                        <line x1="17" y1="16" x2="23" y2="16"></line>
                    </svg>
                </div>
                <div class="action-label">Setting</div>
            </a>

        </div>

        <!-- Premium Navigation Anchor -->
        <div class="system-footer">
            KASIR PROMAX
        </div>
    </div>

    <!-- Live Native Clock Engine Integration -->
    <script>
        function updateLiveClock() {
            const timeDisplay = document.getElementById('liveClock');
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            timeDisplay.textContent = `${hours}:${minutes}`;
        }
        setInterval(updateLiveClock, 1000);
        updateLiveClock();
    </script>
</body>
</html>
