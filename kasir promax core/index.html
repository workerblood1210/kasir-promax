<!DOCTYPE html>
<html lang="id">
<head>
    <script src="js/vendor/dexie.min.js"></script>

    <link rel="stylesheet" href="core.kasirpromax.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Promax</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="ambient-canvas">...</div>
    
    <div id="dynamicIsland" class="dynamic-island-pro">
        <span class="island-message"></span>
    </div>

    <section id="viewActivation" class="spa-view active-view">
        <h2>Aktivasi Lisensi Kasir Promax</h2>
        <input type="text" id="activationCode" placeholder="Masukkan Kode Lisensi">
        <button onclick="processActivation()">Aktivasi</button>
    </section>

    <section id="viewSetup" class="spa-view">
        <h2>Setup Akun Admin Master</h2>
        <input type="text" id="setupUser" placeholder="Username Baru (Min 4)">
        <input type="password" id="setupPass" placeholder="Password Baru (Min 6)">
        <button onclick="processSetup()">Buat Akun</button>
    </section>

    <section id="viewGateway" class="spa-view">
        <h2>Masuk ke Sistem</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="processLogin()">Login</button>
    </section>
    
    <section id="viewDashboardUtama" class="spa-view">...</section>
    
    <section id="viewCatalog" class="spa-view">
        <div id="cartCountBadge">0</div>
        <div id="cartItemsList"></div>
        <div id="cartTotalValue">Rp 0</div>
        <button id="checkoutBtnVisual">Proses Checkout Secure</button>
    </section>
    
    <section id="viewSettings" class="spa-view">...</section>

    <script type="module" src="js/app.js"></script>
    <script type="module">
        import { initGatewayBootSequence } from './js/modules/auth.js';
        import { renderPOSCatalog, setupCatalogDOMEventListeners } from './js/modules/catalog.js';

        // Pindahkan Boot Sequence ke DOMContentLoaded yang dikontrol atau window.onload terpadu
        window.onload = async () => {
            // Tunggu sebentar untuk memastikan seeding database di app.js selesai
            initGatewayBootSequence();       
            setupCatalogDOMEventListeners(); 
            
            // Berikan proteksi jika database sedang seeding
            setTimeout(() => {
                if (typeof renderPOSCatalog === 'function') renderPOSCatalog();
            }, 200);
        };
    </script>
</body>
</html>
